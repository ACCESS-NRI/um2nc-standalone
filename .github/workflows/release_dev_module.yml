name: Release DEVELOPMENT um2nc module
description: |
  This workflow deploys DEVELOPMENT um2nc modules when a PR is opened/synchronised
  having `main` as its base.
  It can also be triggered manually (workflow_dispatch), by specifying the Git reference
  used to create the um2nc binary executable. If no reference is provided, the workflow
  will use the commit SHA of the workflow trigger event.

on:
  pull_request:
    branches: main
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  set_version:
    name: Set version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
    - name: Set version
      id: set-version
      uses: access-nri/containerised-environments-infra/.github/actions/set_version@main
  
  deploy:
    name: Deploy DEVELOPMENT module
    needs: set_version
    uses: ./.github/workflows/deploy_module.yml
    with:
      version: "${{ needs.set_version.outputs.version }}"
      is_stable: false
    secrets: inherit