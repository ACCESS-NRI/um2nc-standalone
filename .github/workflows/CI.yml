# Run CI tests
name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: main
  pull_request:
    branches: main
  workflow_dispatch:
  workflow_call:

jobs:
  verify-conda-build:
    name: Conda Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup conda build environment
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-file: .conda/env_build.yml
          create-args: >-
            python=${{vars.PY_VERSION}}
      
      # conda build cannot get the version from setuptools_scm so we have 
      # to set it in an env var (PACKAGE_VERSION) prior to building 
      # and use it in the meta.yaml
      - name: Get package version
        id: get-version
        shell: micromamba-shell {0}
        run: |
          version=$(python3 -m setuptools_scm)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build and upload the conda packages
        uses: ACCESS-NRI/action-build-and-upload-conda-packages@v3.1.0
        env:
          PACKAGE_VERSION: ${{ steps.get-version.outputs.version }}
        with:
          meta_yaml_dir: .conda
          upload: false
          conda_build_args: -c accessnri -c conda-forge -c nodefaults
  
  tests:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Setup conda build environment
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-file: .conda/env_dev.yml
          create-args: >-
            python=${{ matrix.python-version }}

      - name: Install source
        shell: micromamba-shell {0}
        run: python3 -m pip install --no-deps --no-build-isolation -e .

      - name: List installed packages
        shell: micromamba-shell {0}
        run: micromamba list

      - name: Entrypoint test of um2nc
        shell: micromamba-shell {0}
        run: um2nc --help
      
      - name: Entrypoint test of driver commands
        shell: micromamba-shell {0}
        run: |
          # We include '' in the drivers list to test for the `driver` command without a driver argument
          drivers_list=(
            ''
            esm1p5
            esm1p6
          )
          for driver in "${drivers_list[@]}"; do
            um2nc driver "$driver" --help
          done

      - name: Entrypoint test of convert command
        shell: micromamba-shell {0}
        run: um2nc convert --help

      - name: Run tests
        shell: micromamba-shell {0}
        run: python -m pytest --cov=um2nc --cov-report=html -s test

      # - name: Upload code coverage
      #   # Only upload once for the installed version
      #   if: ${{ matrix.python-version == vars.PY_VERSION }}
      #   uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 #v4.6.0
      #   with:
      #     token: ${{ secrets.codecov_token }}
      #     files: ./coverage.xml
