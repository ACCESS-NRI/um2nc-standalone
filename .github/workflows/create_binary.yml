on:
  workflow_call:
  workflow_dispatch:
    inputs:
      version:
        description: |
          Version of um2nc to create the binary for.
          This should match a tag in the repository.
          Only versions >2.0.0 are supported.
        required: true

jobs:
  create-binary-executable:
    name: Create binary executable
    runs-on: ubuntu-latest
    environment: gadi
    env:
      MICROMAMBA_DOWNLOAD_URL: https://micro.mamba.pm/api/micromamba/linux-64/latest
      UM2NC_DIST_DIR: ${{ secrets.UM2NC_DIST_DIR }}
      PYINSTALLER_SPEC_PATH: binary_dist/pyinstaller.spec
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set UM2NC_VERSION env variable
        run: |
          if [[ '${{ github.event_name }}' == workflow_dispatch ]]; then
            version='${{ github.event.inputs.version }}'
            # Sanity check on version
            if ! git ls-remote --exit-code --tags origin "refs/tags/$version" > /dev/null; then
              echo "::error::Version $version does not match any tag in the repository"
              exit 1
            fi
            if [[ -z $(git ls-tree -r "refs/tags/$version" "$PYINSTALLER_SPEC_PATH") ]]; then
              echo "::error::Tag $version does not contain the required file: $PYINSTALLER_SPEC_PATH"
              exit 1
            fi
          else
            version='${{ github.ref_name }}'
          fi
          echo UM2NC_VERSION=$version >> $GITHUB_ENV

      - name: Set up SSH
        uses: access-nri/actions/.github/actions/setup-ssh@main
        with:
          hosts: "${{ secrets.HOST }}:gadi"
          user: ${{ secrets.USER }}
          private-key: ${{ secrets.SSH_KEY }}
        
      - name: Create executable
        id: create-executable
        run: |
          ssh gadi << 'EOF'
          set -exo pipefail
          work_dir=$(mktemp -d)
          trap "rm -rf $work_dir" EXIT
          repo_dir=$work_dir/${{ github.event.repository.name }}
          mkdir -p $repo_dir
          cd $repo_dir
          echo "Setting up pyinstaller environment"
          export MAMBA_EXE=$work_dir/micromamba
          export MAMBA_ROOT_PREFIX=$work_dir/mamba_root
          # Download micromamba
          echo "Downloading latest micromamba version"
          curl -L ${{ env.MICROMAMBA_DOWNLOAD_URL }} | tar -xvjO bin/micromamba > "$MAMBA_EXE"
          chmod u+x "$MAMBA_EXE"
          "$MAMBA_EXE" --version
          # Create conda environment and install pyinstaller
          env_prefix="$work_dir/pyinstaller"
          $MAMBA_EXE create \
            -y \
            --prefix $env_prefix \
            --no-rc \
            -c conda-forge \
            -c accessnri \
            -c nodefaults \
            pyinstaller \
            um2nc=${{ env.UM2NC_VERSION }}
          # Get pyinstaller.spec from this repository
          spec_file_url='https://raw.githubusercontent.com/${{ github.repository }}/refs/tags/${{ env.UM2NC_VERSION }}/${{ env.PYINSTALLER_SPEC_PATH }}'
          spec_file="$work_dir/pyinstaller.spec"
          curl -L -o "$spec_file" "$spec_file_url"
          # Create binary executable with pyinstaller
          $MAMBA_EXE run \
            --prefix $env_prefix \
            pyinstaller "$spec_file" --distpath um2nc_dist
          # Find the created executable and test it
          UM2NC_EXE=$(find um2nc_dist -type f -name 'um2nc*' -exec realpath {} \;)
          # Test the binary executable
          version=$("$UM2NC_EXE" --version)
          if [[ "$version" != ${{ env.UM2NC_VERSION }} ]]; then
            echo "Unexpected um2nc version: $version. Expected: ${{ env.UM2NC_VERSION }}"
            exit 1
          fi
          # Move the created executable to a shared location on Gadi
          mkdir -p ${{ env.UM2NC_DIST_DIR }}
          mv "$UM2NC_EXE" ${{ env.UM2NC_DIST_DIR }}
          EOF
          # Copy the executable from Gadi to the local runner
          um2nc_exe_dir='${{ github.workspace }}/um2nc_dist'
          mkdir -p "$um2nc_exe_dir"
          rsync gadi:${{ env.UM2NC_DIST_DIR }}/* "$um2nc_exe_dir"
          # Delete the executable from Gadi after copying it to the GitHub runner
          ssh gadi 'rm -rf ${{ env.UM2NC_DIST_DIR }}'
          um2nc_exe_on_github_runner=$(
            find "$um2nc_exe_dir" -type f -name 'um2nc*' -exec realpath {} \;
          )
          echo "um2nc-exe=$um2nc_exe_on_github_runner" >> $GITHUB_OUTPUT
        
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: um2nc-exe
          path: ${{ steps.create-executable.outputs.um2nc-exe }}
